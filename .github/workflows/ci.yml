name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (libs)
        run: pnpm run typecheck:libs

      - name: Type check (wordforest)
        run: pnpm --filter @workspace/wordforest run typecheck

      - name: Build (wordforest)
        run: pnpm --filter @workspace/wordforest run build
        env:
          BASE_PATH: /
          PORT: 3000
          VITE_KRDICT_API_KEY: ${{ secrets.VITE_KRDICT_API_KEY }}

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./artifacts/wordforest/dist
          cname: wordforest-chichiboo.com

# To add the dictionary API key:
# Go to GitHub repository → Settings → Secrets and variables → Actions
# Add a secret named VITE_KRDICT_API_KEY with your API key from
# https://stdict.korean.go.kr/openapi/openApiInfo.do
#
# GitHub Pages is automatically deployed from dist/ on main branch push
